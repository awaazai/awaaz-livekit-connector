# LiveKit Cloud agent deployment config.
#
# This is a template. The authoritative file is generated by the CLI:
#   lk agent create        # scaffolds livekit.toml + Dockerfile, links project
#   lk agent deploy        # build & deploy updates
#
# `lk agent create` will fill in your real subdomain and agent id. Set provider
# keys (DEEPGRAM_API_KEY, OPENAI_API_KEY, ELEVEN_API_KEY) as secrets via the
# LiveKit Cloud dashboard or the CLI -- do not commit them.

[project]
  subdomain = "your-project-subdomain"

[agent]
  id = ""
